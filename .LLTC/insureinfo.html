<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投保信息</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/insureinfo.css">
    <script src="/js/sweetalert2@11.js"></script>
    <script src="/js/axios.js"></script>
    <script>
        window.onload = async () => {

            signout.onclick = () => {
                Swal.fire({
                    title: '确认要退出登录吗',
                    showCancelButton: true,
                    confirmButtonText: '确定',
                }).then((result) => {
                    if (result.isConfirmed) {
                        Swal.fire({
                            position: 'center',
                            icon: 'success',
                            title: '退出完成',
                            showConfirmButton: false,
                            timer: 1500
                        }).then(() => {
                            localStorage.clear()
                            location.pathname = '/'
                        })
                    }
                })

            }

            let cid, uname

            try {
                let { data } = await axios.get('http://127.0.0.1:8080/auth/current', {
                    'headers': { Authorization: `Bearer ${localStorage.getItem("access_token")}` }
                })
                cid = data.cid
                uname = data.uname
            } catch (err) {
                Swal.fire({
                    position: 'center',
                    icon: 'error',
                    title: err.response.data.detail,
                    showCancelButton: true,
                    confirmButtonText: '安全退出并返回首页',
                }).then((result) => {
                    if (result.isConfirmed) {
                        Swal.fire({
                            position: 'center',
                            icon: 'success',
                            title: '退出完成',
                            showConfirmButton: false,
                            timer: 1500
                        }).then(() => {
                            localStorage.clear()
                            location.pathname = '/'
                        })
                    } else {
                        setTimeout(() => {
                            location.reload()
                        }, 1500)
                    }
                })
            }

            _uname.innerHTML = `本卡卡号: ${uname}`

            try {
                let { data } = await axios.get('http://127.0.0.1:8080/card/bindinfo/', {
                    'headers': { Authorization: `Bearer ${localStorage.getItem("access_token")}` }
                })

                _jh.innerHTML = `本卡激活日期: ` + data.effect_date
                _sx.innerHTML = `本卡生效日期: ` + data.effect_date

                let obs = new Proxy({ index: null }, {
                    set(t, k, v, p) {
                        switch (v) {
                            case "2":
                                _list.innerHTML = `<li><span>受益人</span>被保人的法定继承人</li>`
                                break
                            case "1":
                                _list.innerHTML = `
                                <li><span>被保人姓名</span>${data.bbr_name}</li>
                                <li><span>证件</span>${data.bbr_id_type}</li>
                                <li><span>证件号码</span>${data.bbr_id_num}</li>
                                <li><span>性别</span>${data.bbr_sex}</li>
                                <li><span>出生日期</span>${data.bbr_birth}</li>
                                <li><span>电子邮箱</span>${data.bbr_email}</li>
                                <li><span>手机号</span>${data.bbr_tel}</li>
                                <li><span>地址</span>${data.bbr_addr}</li>
                                `
                                break
                            case "0":
                                _list.innerHTML = `
                                <li><span>投保人姓名</span>${data.tbr_name}</li>
                                <li><span>证件</span>${data.tbr_id_type}</li>
                                <li><span>证件号码</span>${data.tbr_id_num}</li>
                                <li><span>性别</span>${data.tbr_sex}</li>
                                <li><span>出生日期</span>${data.tbr_birth}</li>
                                <li><span>电子邮箱</span>${data.tbr_email}</li>
                                <li><span>手机号</span>${data.tbr_tel}</li>
                                <li><span>地址</span>${data.tbr_addr}</li>
                                `
                                break
                        }
                        return Reflect.set(t, k, v, p)
                    }
                })
                let nav = _nav.querySelectorAll('li')
                for (const i in nav) {
                    nav[i].onclick = function () {
                        this.classList.toggle("cuer")
                        nav[obs.index].classList.toggle("cuer")
                        obs.index = i
                    }
                }
                obs.index = '0'
            } catch (err) {
                Swal.fire({
                    position: 'center',
                    icon: 'error',
                    title: err.response.data.detail,
                    showCancelButton: true,
                    confirmButtonText: '安全退出并返回首页',
                }).then((result) => {
                    if (result.isConfirmed) {
                        Swal.fire({
                            position: 'center',
                            icon: 'success',
                            title: '退出完成',
                            showConfirmButton: false,
                            timer: 1500
                        }).then(() => {
                            localStorage.clear()
                            location.pathname = '/'
                        })
                    } else {
                        setTimeout(() => {
                            location.reload()
                        }, 1500)
                    }
                })
            }
        }
    </script>
</head>

<body>
    <div class="header">投保信息</div>
    <!-- 条款列表 -->
    <div class="clauselist">
        <!-- 第1行 -->
        <div class="list1">畅行无忧C卡<a>面值<span>100.00</span> 元</a></div>
        <!-- 第2行 -->
        <div class="list2" id="_uname"></div>
        <!-- 第3行 -->
        <div class="list3" id="_jh">本卡激活日期: 2019-03-12 </div>
        <!-- 第4行 -->
        <div class="list4" id="_sx">本卡保险生效日期: 2019-03-14</div>
        <!-- 第5行 -->
        <div class="list5">本卡保额信息:</div>
        <!-- 第6行 -->
        <div class="list6">交通意外身故、伤残最高保险金额<span>15000.00</span> 元</a></div>
        <!-- 第7行 -->
        <div class="list7">交通意外医疗最高保险金额<span>5000.00</span> 元</div>
        <!-- 第8行 -->
        <div class="list8">
            <ul class="plyhld" id="_nav">
                <li class="cuer">投保人</li>
                <li>被保人</li>
                <li>受益人</li>
            </ul>
            <ul class="lists" id="_list"></ul>
            <button id="signout" class="signout">安全退出</button>
        </div>
    </div>
</body>

</html>
